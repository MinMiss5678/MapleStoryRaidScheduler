apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: maple-raid
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:latest
          args: [tunnel, --no-autoupdate, run]
          env:
            - name: TUNNEL_TOKEN_FILE
              value: /run/secrets/cloudflared_token
          volumeMounts:
            - name: secrets
              mountPath: /run/secrets
              readOnly: true
      volumes:
        - name: secrets
          secret:
            secretName: maple-secrets
            items:
              - key: cloudflared_token
                path: cloudflared_token
