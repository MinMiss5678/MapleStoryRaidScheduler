apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: seq-data
  namespace: maple-raid
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seq
  namespace: maple-raid
spec:
  replicas: 1
  selector:
    matchLabels:
      app: seq
  template:
    metadata:
      labels:
        app: seq
    spec:
      containers:
        - name: seq
          image: datalust/seq:latest
          env:
            - name: ACCEPT_EULA
              value: "Y"
            - name: SEQ_FIRSTRUN_ADMINPASSWORD
              value: admin
          ports:
            - containerPort: 80   # Web UI
            - containerPort: 5341 # Ingest
          volumeMounts:
            - name: seq-data
              mountPath: /data
      volumes:
        - name: seq-data
          persistentVolumeClaim:
            claimName: seq-data
---
apiVersion: v1
kind: Service
metadata:
  name: seq
  namespace: maple-raid
spec:
  selector:
    app: seq
  ports:
    - name: ingest
      port: 5341
      targetPort: 5341
    - name: ui
      port: 80
      targetPort: 80
