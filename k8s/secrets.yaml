# 請勿將真實值提交至 git！
# 部署前執行：
#   kubectl create secret generic maple-secrets -n maple-raid \
#     --from-file=db_connection=./secrets/db_connection.txt \
#     --from-file=postgres_password=./secrets/postgres_password.txt \
#     --from-file=discord_bot_token=./secrets/discord_bot_token.txt \
#     --from-file=discord_client_secret=./secrets/discord_client_secret.txt \
#     --from-file=jwt_secret_key=./secrets/jwt_secret_key.txt \
#     --from-file=cloudflared_token=./secrets/cloudflared_token.txt
#
# 或使用下方 template（替換 <placeholder> 後套用）：
apiVersion: v1
kind: Secret
metadata:
  name: maple-secrets
  namespace: maple-raid
type: Opaque
stringData:
  db_connection: "<Host=database;Database=presentationdb;Username=postgres;Password=CHANGE_ME>"
  postgres_password: "<CHANGE_ME>"
  discord_bot_token: "<CHANGE_ME>"
  discord_client_secret: "<CHANGE_ME>"
  jwt_secret_key: "<CHANGE_ME>"
  cloudflared_token: "<CHANGE_ME>"
